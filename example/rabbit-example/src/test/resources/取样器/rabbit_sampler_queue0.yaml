title: rabbitmq_sampler_0
testclass: rabbit  # 取样器类型
config: # 处理器配置
  # 推荐使用 url 格式：amqp://[用户名:密码@]主机地址[:端口]/[虚拟主机]
  url: amqp://guest:guest@localhost:5672/  # RabbitMQ 连接地址
  timeout: 5000 # 连接超时时间，毫秒，默认值：60000
  queue: # 队列配置
    name: ryze.topic  # 消息队列名称
    durable:  # 是否持久化队列，可空，默认值：false
    exclusive:  # 是否独占队列，可空，默认值：false
    auto_delete:  # 是否自动删除，可空，默认值：false
    arguments:  # 消息队列其他属性，keyword对象，可空
  message: # 发送的消息，可以是任意json对象、字符串、数字等
    name: rabbitmq_sampler
    age: 18